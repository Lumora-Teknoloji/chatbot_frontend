name: Chatbot Frontend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            echo "🔌 Sunucuya bağlanılıyor..."

            # 1. Chatbot Frontend klasörüne git
            cd /var/www/backend/chatbot_frontend

            # 2. Güncel kodları çek (lokal değişiklikleri stash'le)
            echo "📥 Kodlar çekiliyor..."
            git stash --include-untracked || true
            git pull origin main

            # 3. Bağımlılıkları yükle
            echo "📦 NPM paketleri yükleniyor..."
            npm install --production=false

            # 4. Projeyi derle
            echo "🔨 Next.js build başlatılıyor..."
            npm run build

            # 5. PM2 ile yeniden başlat
            echo "🚀 PM2 servisi yeniden başlatılıyor..."
            pm2 restart lumora-frontend || pm2 start npm --name "lumora-frontend" -- start

            echo "✅ Chatbot Frontend başarıyla güncellendi!"
